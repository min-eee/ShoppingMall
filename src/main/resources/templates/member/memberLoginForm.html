<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout1}">

<!-- 사용자 CSS 추가 -->
<th:block layout:fragment="css">
  <style>
        .error {
            color: #bd2130;
        }
    </style>
</th:block>

<div layout:fragment="content">

  <form role="form" method="post" action="/members/login">
    <div class="form-group">
      <label th:for="Email">이메일</label>
      <input type="text" name="Email" class="form-control" placeholder="이메일을 입력해주세요">
    </div>
    <div class="form-group">
      <label th:for="password">비밀번호</label>
      <input type="password" name="password" id="password" class="form-control" placeholder="비밀번호를 입력해주세요">
    </div>
    <p th:if="${loginErrorMsg}" class="error" th:text="${loginErrorMsg}"></p>
    <button class="btn btn-dark">로그인</button>

    <button type="button" class="btn btn-dark" onclick="location.href='/members/help'">아이디 찾기</button>

    <button type="button" class="btn btn-dark" onclick="location.href='/members/new'">회원가입</button>
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
  </form>
  <a href="/oauth2/authorization/google">구글 아이디로 로그인</a>
  <a href="/oauth2/authorization/naver">네이버 아이디로 로그인</a>
  <a href="/oauth2/authorization/kakao">카카오 아이디로 로그인</a>
<!-- 각 사이트에 가서 정보를 받아옴.  -->
</div>

</html>
